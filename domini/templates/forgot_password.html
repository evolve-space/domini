{% extends "base.html" %}
{% set body_class = "auth-page" %}

{% block chrome %}
<header class="auth-language-bar">
    <div class="language-switcher" aria-label="{{ g.t.language_label }}" title="{{ g.t.language_tooltip }}" data-i18n-title="language_tooltip">
        {% for code, label in languages.items() %}
            <button class="lang-option{% if code == g.lang %} is-active{% endif %}" type="button" data-lang="{{ code }}" aria-label="{{ label }}">{{ label }}</button>
        {% endfor %}
    </div>
</header>
{% endblock %}

{% block content %}
<section class="auth-card">
    <div class="auth-logo">
        <span class="logo logo-static"><span class="logo-mark">D</span><span>OMINI</span></span>
    </div>
    <div class="auth-heading">
        <span class="eyebrow" data-i18n="auth_kicker">{{ g.t.auth_kicker }}</span>
        <h1 data-i18n="forgot_password">{{ g.t.forgot_password }}</h1>
        <p data-i18n="reset_password_help">{{ g.t.reset_password_help }}</p>
    </div>
    <form class="auth-form" method="post">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <label class="field">
            <span data-i18n="email">{{ g.t.email }}</span>
            <input name="email" type="email" autocomplete="email" required placeholder="{{ g.t.email_placeholder }}" data-i18n-placeholder="email_placeholder">
        </label>
        <button class="primary-button" type="submit" data-i18n="send_reset_link">{{ g.t.send_reset_link }}</button>
    </form>
    <nav class="auth-links">
        <a href="{{ url_for('auth.login') }}" data-i18n="back_to_login">{{ g.t.back_to_login }}</a>
    </nav>
</section>
{% endblock %}
