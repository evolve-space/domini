{% extends "base.html" %}
{% set body_class = "auth-page" %}

{% block chrome %}
<header class="auth-language-bar">
    <div class="language-switcher" aria-label="{{ g.t.language_label }}" title="{{ g.t.language_tooltip }}" data-i18n-title="language_tooltip">
        {% for code, label in languages.items() %}
            <button class="lang-option{% if code == g.lang %} is-active{% endif %}" type="button" data-lang="{{ code }}" aria-label="{{ label }}">{{ label }}</button>
        {% endfor %}
    </div>
</header>
{% endblock %}

{% block content %}
<section class="auth-card">
    <div class="auth-logo">
        <span class="logo logo-static"><span class="logo-mark">D</span><span>OMINI</span></span>
    </div>
    <div class="auth-heading">
        <span class="eyebrow" data-i18n="auth_kicker">{{ g.t.auth_kicker }}</span>
        <h1 data-i18n="reset_password">{{ g.t.reset_password }}</h1>
    </div>
    <form class="auth-form" method="post">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <label class="field">
            <span data-i18n="password">{{ g.t.password }}</span>
            <input id="password-input" name="password" type="password" autocomplete="new-password" required placeholder="{{ g.t.password_placeholder }}" data-i18n-placeholder="password_placeholder">
        </label>
        <p class="password-hint" id="password-hint" data-i18n="password_requirements">{{ g.t.password_requirements }}</p>
        <label class="field">
            <span data-i18n="confirm_password">{{ g.t.confirm_password }}</span>
            <input name="password_confirm" type="password" autocomplete="new-password" required placeholder="{{ g.t.confirm_password }}" data-i18n-placeholder="confirm_password">
        </label>
        <button class="primary-button" type="submit" data-i18n="reset_password">{{ g.t.reset_password }}</button>
    </form>
</section>
<script>
    const passwordInput = document.getElementById("password-input");
    const passwordHint = document.getElementById("password-hint");
    passwordInput.addEventListener("input", () => {
        const valid = passwordInput.value.length >= 8 && /[A-Za-z]/.test(passwordInput.value) && /\d/.test(passwordInput.value);
        passwordHint.classList.toggle("is-valid", valid);
    });
</script>
{% endblock %}
